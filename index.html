<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Picker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0F0F;
  --surface: #181818;
  --surface2: #222222;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text: #F0EDE8;
  --text-muted: #666;
  --text-dim: #999;
  --accent: #E8FF47;
  --accent-dark: #B8CC1A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

header {
  padding: 2.5rem 2rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.wordmark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.5rem;
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--text);
}
.wordmark span { color: var(--accent); }
.header-sub {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.06em;
  padding-bottom: 0.35rem;
}

main {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.filter-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  padding: 4px;
  border-radius: 10px;
  border: 1px solid var(--border);
  flex-wrap: wrap;
}
.tab {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.05em;
  padding: 7px 14px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: var(--accent);
  color: #0F0F0F;
  font-weight: 500;
}

#roll-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  padding: 10px 32px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #0F0F0F;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
#roll-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
#roll-btn:active { transform: scale(0.97) translateY(0); }

#outfit-area { min-height: 300px; }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  letter-spacing: 0.05em;
  gap: 0.75rem;
}
.empty-icon {
  font-size: 2rem;
  opacity: 0.25;
}

@keyframes slidein {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.outfit-card { animation: slidein 0.22s ease-out; }

.outfit-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 1.25rem;
  gap: 1rem;
}
.outfit-scheme {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  letter-spacing: 0.05em;
  line-height: 1;
  color: var(--text);
}
.outfit-sub {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 5px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
}

.rating-pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid;
  white-space: nowrap;
  align-self: flex-start;
  flex-shrink: 0;
}
.rating-strong  { border-color: #4CAF50; color: #4CAF50; background: rgba(76,175,80,0.07); }
.rating-solid   { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.07); }
.rating-exp     { border-color: #FF9800; color: #FF9800; background: rgba(255,152,0,0.07); }
.rating-risky   { border-color: #F44336; color: #F44336; background: rgba(244,67,54,0.07); }

.palette-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 1.25rem;
  padding: 0.7rem 1rem;
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  flex-wrap: wrap;
}
.palette-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-right: 4px;
}
.swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  flex-shrink: 0;
}
.swatch-name { font-size: 0.7rem; color: var(--text-dim); }
.swatch-sep { width: 1px; height: 14px; background: var(--border); margin: 0 2px; }

.pieces-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
  gap: 8px;
  margin-bottom: 1rem;
}
.piece-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px;
  transition: border-color 0.15s;
}
.piece-card:hover { border-color: var(--border-hover); }
.piece-cat {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.piece-name {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 8px;
}
.piece-color-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.piece-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.piece-color-name { font-size: 0.68rem; color: var(--text-muted); }
.piece-score {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-muted);
}
.piece-score.pos { color: #66BB6A; }
.piece-score.neg { color: #EF5350; }

.why-block {
  background: var(--surface);
  border-left: 2px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 0.8rem 1rem;
  font-size: 0.8rem;
  color: var(--text-dim);
  line-height: 1.7;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.stats-row {
  display: flex;
  gap: 2rem;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.stat { }
.stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: var(--accent);
  line-height: 1;
}
.stat-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-top: 3px;
}

footer {
  text-align: center;
  padding: 2rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  border-top: 1px solid var(--border);
}
footer a { color: var(--text-muted); text-decoration: none; }
footer a:hover { color: var(--text); }

@media(max-width:600px){
  .wordmark{font-size:2.5rem}
  header{padding:1.5rem 1rem 1rem}
  main{padding:1.25rem 1rem 3rem}
  .stats-row{gap:1.25rem}
}
</style>
</head>
<body>

<header>
  <div class="wordmark">Fit<span>Picker</span></div>
  <div class="header-sub">Streetwear · Menswear · Spring / Warm weather</div>
</header>

<main>
  <div class="controls">
    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('all',this)">All fits</button>
      <button class="tab" onclick="setFilter('shorts',this)">Shorts</button>
      <button class="tab" onclick="setFilter('pants',this)">Pants</button>
      <button class="tab" onclick="setFilter('high',this)">High preference</button>
    </div>
    <button id="roll-btn" onclick="rollOutfit()">Roll fit ↻</button>
  </div>

  <div id="outfit-area">
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <div>Hit Roll fit to generate a coordinated outfit</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="roll-count">0</div><div class="stat-lbl">Rolls</div></div>
    <div class="stat"><div class="stat-val" id="strong-count">0</div><div class="stat-lbl">Strong fits</div></div>
    <div class="stat"><div class="stat-val" id="exp-count">0</div><div class="stat-lbl">Experimental</div></div>
    <div class="stat"><div class="stat-val" id="risky-count">0</div><div class="stat-lbl">Risky fits</div></div>
  </div>
</main>

<footer>Built around your wardrobe · Color-theory coordinated · <a href="https://github.com" target="_blank">View on GitHub</a></footer>

<script>
const WARDROBE = {

    // OVERSIZED — pants only, warm:false flags them out of shorts logic
    {id:'o1',name:'Black vintage Penguin cooler sweatshirt (oversized)',cat:'hoodie',hex:'#1C1C1C',score:1,warm:false,oversized:true},

    {id:'o3',name:'Vintage Champion gray sweatshirt (oversized)',cat:'hoodie',hex:'#9E9E9E',score:0,warm:false,oversized:true},
    {id:'o4',name:'Camo sweatshirt (oversized)',cat:'hoodie',hex:'#556B2F',score:0,warm:false,oversized:true},
    // Collared / button-up
    {id:'c1',name:'Formal white button-up',cat:'collar',hex:'#F0EDE8',score:-2,warm:true,oversized:false},
    {id:'c2',name:'Red collared shirt',cat:'collar',hex:'#C0392B',score:-1,warm:true,oversized:false},

    {id:'s1',name:'White tee',hex:'#F0EDE8',score:0},

    {id:'bt4',name:'White shorts',hex:'#F0EDE8',score:0,isShorts:true},
    {id:'bt5',name:'Navy blue shorts',hex:'#1B2A4A',score:0,isShorts:true},
    {id:'bt6',name:'Light blue shorts',hex:'#90CAF9',score:0,isShorts:true},
    {id:'bt7',name:'Black jeans',hex:'#1C1C1C',score:-1,isShorts:false},
    {id:'bt8',name:'Grey oversized jeans',hex:'#8A8A8A',score:-1,isShorts:false},
    {id:'bt9',name:'Blue oversized jeans',hex:'#5C85B0',score:-1,isShorts:false},
    {id:'bt10',name:'Black track pants',hex:'#1C1C1C',score:-1,isShorts:false},
  ],
  shoes: [
    {id:'sh1',name:'Black New Balances',hex:'#1C1C1C',score:2},
    {id:'sh2',name:'Grey/black New Balances',hex:'#757575',score:2},
    {id:'sh3',name:'Jordan 4 Pine Green',hex:'#2D6A4F',score:-2},
    {id:'sh4',name:'Black Yeezy slides',hex:'#1C1C1C',score:2},
    {id:'sh5',name:'Yellow Yeezy slides',hex:'#F9C922',score:2},
  ]
};

const SCHEMES = {
  monochrome:{ name:'Monochromatic', desc:'Same tone family throughout — clean, unified, intentional.' },
  contrast:  { name:'High contrast', desc:'Light vs dark — one of the strongest moves in casual menswear.' },
  bold:      { name:'Bold statement', desc:'Saturated color as the focal point, everything else pulled back.' },
  analogous: { name:'Analogous', desc:'Neighboring hues that naturally sit together without matching exactly.' },
  earth:     { name:'Earth tones', desc:'Browns, olives, and naturals — quietly elevated and underused.' },
  neutral:   { name:'Neutral anchor', desc:'One statement piece; the rest of the fit stays clean and grounded.' },
};

let rollCount=0,strongCount=0,expCount=0,riskyCount=0;
let currentFilter='all';
let lastTopId='',lastBottomId='';

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// Weight curves per filter
function scoreWeight(score,filter){
  if(filter==='high'){
    if(score<1) return 0;
    return Math.pow(score+1,2.2);
  }
  if(filter==='all'){
    if(score>=3)  return 20;
    if(score===2) return 13;
    if(score===1) return 7;
    if(score===0) return 3;
    if(score===-1)return 1.5;
    if(score===-2)return 0.6;
    return 0.2;
  }
  // shorts / pants
  if(score>=3)  return 18;
  if(score===2) return 11;
  if(score===1) return 6;
  if(score===0) return 2.5;
  if(score===-1)return 1.2;
  if(score===-2)return 0.4;
  return 0.15;
}

function weightedPick(arr,filter){
  const total=arr.reduce((s,x)=>s+scoreWeight(x.score,filter),0);
  if(total===0) return arr[Math.floor(Math.random()*arr.length)];
  let r=Math.random()*total;
  for(const x of arr){r-=scoreWeight(x.score,filter);if(r<=0)return x;}
  return arr[arr.length-1];
}

function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);let h=0,s,l=(max+min)/2;
  if(max!==min){const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
  switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}
  }else s=0;
  return{h:h*360,s:s*100,l:l*100};
}

function colorName(hex){
  const map={'#1C1C1C':'Black','#F0EDE8':'White','#9E9E9E':'Gray','#BDBDBD':'Light gray',
    '#ADADAD':'Gray','#555555':'Dark gray','#6B4226':'Brown','#1B2A4A':'Navy',
    '#C0392B':'Red','#D4560A':'Orange','#A50044':'Burgundy','#005695':'Blue',
    '#4A90D9':'Blue','#90CAF9':'Light blue','#5C85B0':'Medium blue','#556B2F':'Camo olive',
    '#F9C922':'Yellow','#2D6A4F':'Pine green','#757575':'Gray/black','#8A8A8A':'Gray',
    '#1B4D2E':'Forest green'};
  return map[hex]||'Mixed';
}

function getScheme(topHex,botHex,shoeHex){
  const t=hexToHsl(topHex),b=hexToHsl(botHex);
  const neutral=h=>h.s<15;
  const saturated=h=>h.s>45;
  if(neutral(t)&&neutral(b)) return 'monochrome';
  if(Math.abs(t.l-b.l)>42) return 'contrast';
  if(saturated(t)&&t.s>55) return 'bold';
  if(Math.abs(t.h-b.h)<35&&t.s>12&&b.s>12) return 'analogous';
  if((topHex==='#6B4226'||topHex==='#556B2F')&&neutral(b)) return 'earth';
  return 'neutral';
}

function compatible(topHex,botHex,shoeHex){
  if(topHex===botHex&&!['#1C1C1C','#F0EDE8','#9E9E9E','#ADADAD'].includes(topHex)) return false;
  if(topHex==='#C0392B'&&(botHex==='#1B2A4A'||botHex==='#005695')) return false;
  if(topHex==='#A50044'&&(botHex==='#C0392B'||botHex==='#1B4D2E')) return false;
  if(topHex==='#1B4D2E'&&botHex==='#90CAF9') return false;
  if(topHex==='#D4560A'&&botHex==='#F0EDE8') return false;
  if(topHex==='#4A90D9'&&botHex==='#1B2A4A') return false;
  if(shoeHex==='#F9C922'&&(botHex==='#90CAF9'||botHex==='#F0EDE8'||botHex==='#5C85B0')) return false;
  if(shoeHex==='#F9C922'&&(topHex==='#C0392B'||topHex==='#A50044')) return false;
  if(shoeHex==='#2D6A4F'&&(topHex==='#C0392B'||topHex==='#A50044'||topHex==='#D4560A')) return false;
  if(shoeHex==='#2D6A4F'&&(botHex==='#90CAF9'||botHex==='#1B2A4A')) return false;
  return true;
}

function getRating(score,scheme){
  if(score<=-3) return {label:'Risky fit',cls:'rating-risky',key:'risky'};
  if(score<=-1||scheme==='bold') return {label:'Experimental',cls:'rating-exp',key:'exp'};
  if(score>=5) return {label:'Strong fit',cls:'rating-strong',key:'strong'};
  return {label:'Solid fit',cls:'rating-solid',key:'solid'};
}

function buildWhy(top,shirt,bottom,shoe,scheme){
  const tips=[];
  if(top.cat==='jersey') tips.push('Jersey over a '+(shirt&&shirt.hex==='#1C1C1C'?'black':'white')+' tee — classic streetwear layering. Keep a bit of the tee visible at the hem.');
  if(top.hex==='#D4560A') tips.push('The dirt bike jersey is loud in the best way. Dark neutral bottoms keep the fit from looking chaotic.');
  if(top.hex==='#6B4226') tips.push('Brown is the most underrated neutral in streetwear. Few people wear it. Fewer wear it well.');
  if(top.hex==='#C0392B') tips.push('Vintage red reads bold but grounded. The worn-in look takes the edge off the saturation.');
  if(top.hex==='#556B2F') tips.push('Camo is a statement on its own. Dark shoes and a neutral bottom let it breathe without fighting for attention.');
  if(top.hex==='#1B4D2E') tips.push('Forest green is legitimately trending streetwear territory right now. Earth or neutral tones around it keep the fit cohesive.');
  if(top.oversized) tips.push('Oversized top with pants is the silhouette call here — proportions work. Same top with shorts would look unbalanced.');
  if(bottom.hex==='#1C1C1C') tips.push('Black bottoms are the streetwear cheat code — they absorb almost any top color without competing.');
  if(bottom.hex==='#BDBDBD') tips.push('Light grey shorts are slept on. They can swing minimal or sporty depending entirely on what is above them.');
  if(shoe.hex==='#F9C922') tips.push('Yellow slides are the accent of the entire fit. One bold pop — nothing else should compete.');
  if(shoe.hex==='#2D6A4F') tips.push('Pine green Jordans need negative space around them. Keep the palette cool and neutral so the shoe lands.');
  if(top.score<=-1&&bottom.score<=-1) tips.push('Both pieces are lower preference — that is fine, it is still color-coordinated. Consider swapping one for a higher-rated piece if it feels off.');
  if(scheme==='monochrome') tips.push('Monochromatic fits live or die by proportion. Make sure the silhouette feels deliberate and not accidental.');
  if(scheme==='contrast'&&!tips.length) tips.push('Light and dark contrast is one of the cleanest combinations in casual menswear. Reads well from a distance.');
  if(scheme==='earth'&&!tips.length) tips.push('Earth tones together signal quiet confidence — this is a palette most people never pull off intentionally.');
  if(scheme==='bold'&&!tips.length) tips.push('Bold saturated color as the focal point. Keep everything else restrained — do not compete with the statement piece.');
  if(!tips.length) tips.push(SCHEMES[scheme]?.desc||'Colors are balanced and complementary for a spring streetwear fit.');
  return tips[0];
}

function scoreLabel(s){
  if(s>0) return {text:'+'+s,cls:'pos'};
  if(s<0) return {text:''+s,cls:'neg'};
  return {text:'±0',cls:''};
}

function rollOutfit(){
  const f=currentFilter;
  let attempts=0,outfit=null;

  while(attempts<400){
    attempts++;

    // --- Determine bottom / shorts vs pants ---
    let bottomPool;
    if(f==='shorts') bottomPool=WARDROBE.bottoms.filter(b=>b.isShorts);
    else if(f==='pants') bottomPool=WARDROBE.bottoms.filter(b=>!b.isShorts);
    else if(f==='high') bottomPool=WARDROBE.bottoms.filter(b=>b.isShorts&&b.score>=0);
    else {
      // All fits: 72% shorts, 28% pants
      bottomPool=Math.random()<0.72
        ? WARDROBE.bottoms.filter(b=>b.isShorts)
        : WARDROBE.bottoms.filter(b=>!b.isShorts);
    }
    if(!bottomPool.length) continue;
    const bottom=weightedPick(bottomPool,f);
    const usingPants=!bottom.isShorts;

    // --- Top pool rules ---
    let topPool=WARDROBE.tops.filter(t=>{
      if(f==='high'&&t.score<1) return false;
      // Oversized: ONLY allowed when using pants
      if(t.oversized&&!usingPants) return false;
      // Non-oversized non-warm items: don't pair with shorts (collared shirts fine)
      if(!usingPants&&!t.warm&&!t.oversized) return false;
      return true;
    });
    if(!topPool.length) continue;
    const top=weightedPick(topPool,f);

    // --- Under-shirt (jerseys and hoodies need one) ---
    let shirt=null;
    if(top.cat==='jersey'||top.cat==='hoodie'){
      // Match shirt tone to top: white jersey → black tee; dark top → black tee; light top → either
      const darkTop=['#1C1C1C','#1B2A4A','#A50044','#005695','#1B4D2E'].includes(top.hex);
      const shirtPool=darkTop
        ? WARDROBE.shirts.filter(s=>s.hex==='#1C1C1C'||s.hex==='#F0EDE8')
        : WARDROBE.shirts;
      shirt=weightedPick(shirtPool,f);
    }

    // --- Shoe ---
    let shoePool=f==='high'?WARDROBE.shoes.filter(s=>s.score>=1):WARDROBE.shoes;
    if(!shoePool.length) shoePool=WARDROBE.shoes;
    let shoe=null;
    for(let si=0;si<40;si++){
      const c=weightedPick(shoePool,f);
      if(compatible(top.hex,bottom.hex,c.hex)){shoe=c;break;}
    }
    if(!shoe) continue;
    if(!compatible(top.hex,bottom.hex,shoe.hex)) continue;

    // No exact repeat back-to-back
    if(top.id===lastTopId&&bottom.id===lastBottomId) continue;

    const scheme=getScheme(top.hex,bottom.hex,shoe.hex);
    const totalScore=top.score+bottom.score+shoe.score;
    const rating=getRating(totalScore,scheme);

    outfit={top,shirt,bottom,shoe,scheme,totalScore,rating};
    lastTopId=top.id; lastBottomId=bottom.id;
    break;
  }

  if(!outfit){
    document.getElementById('outfit-area').innerHTML='<div class="empty-state"><div class="empty-icon">✕</div><div>No valid fit found for this filter — try another</div></div>';
    return;
  }

  // Update stats
  rollCount++;
  if(outfit.rating.key==='strong') strongCount++;
  if(outfit.rating.key==='exp') expCount++;
  if(outfit.rating.key==='risky') riskyCount++;
  document.getElementById('roll-count').textContent=rollCount;
  document.getElementById('strong-count').textContent=strongCount;
  document.getElementById('exp-count').textContent=expCount;
  document.getElementById('risky-count').textContent=riskyCount;

  renderOutfit(outfit);
}

function renderOutfit({top,shirt,bottom,shoe,scheme,totalScore,rating}){
  const si=SCHEMES[scheme]||SCHEMES.neutral;
  const why=buildWhy(top,shirt,bottom,shoe,scheme);

  // Deduplicated swatches
  const rawSwatches=[
    {hex:top.hex,label:colorName(top.hex)},
    ...(shirt?[{hex:shirt.hex,label:colorName(shirt.hex)+' (under)'}]:[]),
    {hex:bottom.hex,label:colorName(bottom.hex)},
    {hex:shoe.hex,label:colorName(shoe.hex)},
  ];
  const swatches=rawSwatches.filter((s,i,a)=>i===0||s.hex!==a[i-1].hex);
  const swatchHTML=swatches.map((s,i)=>`
    ${i>0?'<div class="swatch-sep"></div>':''}
    <div class="swatch" style="background:${s.hex}" title="${s.label}"></div>
    <span class="swatch-name">${s.label}</span>`).join('');

  // Pieces
  const pieces=[
    {cat:top.cat==='jersey'?'Jersey':top.cat==='collar'?'Outer shirt':'Sweatshirt / hoodie',item:top.name,hex:top.hex,score:top.score},
    ...(shirt?[{cat:'Under shirt',item:shirt.name,hex:shirt.hex,score:shirt.score}]:[]),
    {cat:bottom.isShorts?'Shorts':'Pants',item:bottom.name,hex:bottom.hex,score:bottom.score},
    {cat:'Shoes',item:shoe.name,hex:shoe.hex,score:shoe.score},
  ];
  const piecesHTML=pieces.map(p=>{
    const sl=scoreLabel(p.score);
    return `<div class="piece-card">
      <div class="piece-cat">${p.cat}</div>
      <div class="piece-name">${p.item}</div>
      <div class="piece-color-row">
        <div class="piece-dot" style="background:${p.hex}"></div>
        <span class="piece-color-name">${colorName(p.hex)}</span>
        <span class="piece-score ${sl.cls}">${sl.text}</span>
      </div>
    </div>`;
  }).join('');

  const sc=Math.round(totalScore);
  const scLabel=sc>0?'+'+sc:''+sc;
  const typeTag=bottom.isShorts?'Shorts fit':'Pants fit';
  const oversizedTag=top.oversized?' · Oversized top':'';

  document.getElementById('outfit-area').innerHTML=`
    <div class="outfit-card">
      <div class="outfit-header">
        <div>
          <div class="outfit-scheme">${si.name}</div>
          <div class="outfit-sub">Score ${scLabel} · ${typeTag}${oversizedTag}</div>
        </div>
        <div class="rating-pill ${rating.cls}">${rating.label}</div>
      </div>
      <div class="palette-bar">
        <span class="palette-label">Palette</span>
        ${swatchHTML}
      </div>
      <div class="pieces-grid">${piecesHTML}</div>
      <div class="why-block">${why}</div>
    </div>`;
}
</script>
