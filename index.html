<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Picker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0F0F;
  --surface: #181818;
  --surface2: #222222;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text: #F0EDE8;
  --text-muted: #666;
  --text-dim: #999;
  --accent: #4CA8FF;
  --accent-dark: #1A7AE8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

header {
  padding: 2.5rem 2rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.wordmark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.5rem;
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--text);
}
.wordmark span { color: var(--accent); }
.header-sub {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.06em;
  padding-bottom: 0.35rem;
}

main {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.controls-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  padding: 4px;
  border-radius: 10px;
  border: 1px solid var(--border);
  flex-wrap: wrap;
}
.tab {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.05em;
  padding: 7px 14px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: var(--accent);
  color: #0F0F0F;
  font-weight: 500;
}

#wardrobe-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.05em;
  padding: 9px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
#wardrobe-btn:hover { color: var(--text); border-color: var(--border-hover); }

.controls-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

#roll-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  padding: 10px 32px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #0F0F0F;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
#roll-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
#roll-btn:active { transform: scale(0.97) translateY(0); }

#outfit-area { min-height: 300px; }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  letter-spacing: 0.05em;
  gap: 0.75rem;
}
.empty-icon {
  font-size: 2rem;
  opacity: 0.25;
}

@keyframes slidein {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.outfit-card { animation: slidein 0.22s ease-out; }

.outfit-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 1.25rem;
  gap: 1rem;
}
.outfit-scheme {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  letter-spacing: 0.05em;
  line-height: 1;
  color: var(--text);
}
.outfit-sub {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 5px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
}

.rating-pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid;
  white-space: nowrap;
  align-self: flex-start;
  flex-shrink: 0;
}
.rating-strong  { border-color: #4CAF50; color: #4CAF50; background: rgba(76,175,80,0.07); }
.rating-solid   { border-color: var(--accent); color: var(--accent); background: rgba(76,168,255,0.07); }
.rating-exp     { border-color: #FF9800; color: #FF9800; background: rgba(255,152,0,0.07); }
.rating-risky   { border-color: #F44336; color: #F44336; background: rgba(244,67,54,0.07); }

.palette-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 1.25rem;
  padding: 0.7rem 1rem;
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  flex-wrap: wrap;
}
.palette-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-right: 4px;
}
.swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  flex-shrink: 0;
}
.swatch-name { font-size: 0.7rem; color: var(--text-dim); }
.swatch-sep { width: 1px; height: 14px; background: var(--border); margin: 0 2px; }

.pieces-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 8px;
  margin-bottom: 1rem;
}

.piece-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.piece-card:hover { border-color: var(--border-hover); }

.piece-img-wrap {
  width: 100%;
  aspect-ratio: 4 / 3;
  background: var(--surface2);
  overflow: hidden;
}
.piece-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.piece-card-body {
  padding: 11px 13px 13px;
}
.piece-card-top-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 8px;
}

.piece-cat {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.piece-name {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
}
.piece-color-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.piece-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.piece-color-name { font-size: 0.68rem; color: var(--text-muted); }
.piece-score {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-muted);
}
.piece-score.pos { color: #66BB6A; }
.piece-score.neg { color: #EF5350; }

/* Re-roll button on piece card */
.reroll-slot-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  flex-shrink: 0;
  transition: all 0.15s;
  line-height: 1;
  padding: 0;
}
.reroll-slot-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(76,168,255,0.07);
}
.reroll-slot-btn:active { transform: rotate(90deg) scale(0.9); }

.why-block {
  background: var(--surface);
  border-left: 2px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 0.8rem 1rem;
  font-size: 0.8rem;
  color: var(--text-dim);
  line-height: 1.7;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.stats-row {
  display: flex;
  gap: 2rem;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.stat { }
.stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: var(--accent);
  line-height: 1;
}
.stat-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-top: 3px;
}

footer {
  text-align: center;
  padding: 2rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  border-top: 1px solid var(--border);
}
footer a { color: var(--text-muted); text-decoration: none; }
footer a:hover { color: var(--text); }

/* ── WARDROBE MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 200;
  display: none;
  align-items: stretch;
  justify-content: flex-end;
}
.modal-overlay.open { display: flex; }

@keyframes panelSlideIn {
  from { transform: translateX(100%); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

.wardrobe-panel {
  width: min(480px, 100vw);
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 1.75rem 1.5rem 3rem;
  animation: panelSlideIn 0.22s ease-out;
}

.wardrobe-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
}
.wardrobe-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: 0.05em;
  color: var(--text);
}
.wardrobe-title span { color: var(--accent); }

.wardrobe-subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  margin-bottom: 1.25rem;
}

.close-btn {
  background: none; border: none;
  color: var(--text-muted);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  line-height: 1;
  transition: color 0.12s;
}
.close-btn:hover { color: var(--text); }

.reset-scores-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.04em;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
  margin-bottom: 1.25rem;
}
.reset-scores-btn:hover { color: #EF5350; border-color: #EF5350; }

.wardrobe-section-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 0 0 0.4rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.4rem;
  margin-top: 1.25rem;
}
.wardrobe-section-title:first-of-type { margin-top: 0; }

.wardrobe-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.035);
}
.wardrobe-item:last-child { border-bottom: none; }

.wi-thumb {
  width: 40px; height: 40px;
  border-radius: 7px;
  background: var(--surface2);
  overflow: hidden;
  flex-shrink: 0;
  border: 1px dashed rgba(255,255,255,0.12);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  transition: border-color 0.12s;
}
.wi-thumb:hover { border-color: var(--accent); border-style: solid; }
.wi-thumb img { width: 100%; height: 100%; object-fit: cover; }
.wi-thumb-icon {
  font-size: 0.75rem;
  color: var(--text-muted);
  pointer-events: none;
  transition: color 0.12s;
}
.wi-thumb:hover .wi-thumb-icon { color: var(--accent); }

.wi-info { flex: 1; min-width: 0; }
.wi-name {
  font-size: 0.75rem;
  color: var(--text);
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.wi-base {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.wi-controls {
  display: flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
}
.wi-btn {
  width: 22px; height: 22px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
  padding: 0; line-height: 1;
}
.wi-btn:hover { border-color: var(--accent); color: var(--accent); }
.wi-val {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  width: 32px;
  text-align: center;
  color: var(--text-dim);
}
.wi-val.pos { color: #66BB6A; }
.wi-val.neg { color: #EF5350; }
.wi-val.modified { text-decoration: underline; text-underline-offset: 2px; }

/* hidden file inputs */
input[type="file"].hidden-upload { display: none; }

@media(max-width:600px){
  .wordmark{font-size:2.5rem}
  header{padding:1.5rem 1rem 1rem}
  main{padding:1.25rem 1rem 3rem}
  .stats-row{gap:1.25rem}
  .wardrobe-panel{padding:1.25rem 1rem 2.5rem}
}
</style>
</head>

<header>

    <div class="header-sub">Streetwear · Menswear · Spring / Warm weather</div>
  </div>
</header>

<!-- Wardrobe modal -->
<div class="modal-overlay" id="wardrobe-modal" onclick="handleOverlayClick(event)">
  <div class="wardrobe-panel" id="wardrobe-panel">
    <div class="wardrobe-header">
      <div class="wardrobe-title">Ward<span>robe</span></div>
      <button class="close-btn" onclick="closeWardrobe()">✕</button>
    </div>
    <div class="wardrobe-subtitle">Tap a thumbnail to add a photo · Adjust scores with +/−</div>
    <button class="reset-scores-btn" onclick="resetAllScores()">Reset all scores to default</button>
    <div id="wardrobe-list"></div>
  </div>
</div>

<main>
  <div class="controls">
    <div class="controls-left">
      <div class="filter-tabs">
        <button class="tab active" onclick="setFilter('all',this)">All fits</button>
        <button class="tab" onclick="setFilter('shorts',this)">Shorts</button>
        <button class="tab" onclick="setFilter('pants',this)">Pants</button>
        <button class="tab" onclick="setFilter('high',this)">High preference</button>
      </div>
      <button id="wardrobe-btn" onclick="openWardrobe()">⚙ Wardrobe</button>
    </div>
    <div class="controls-right">
      <button id="roll-btn" onclick="rollOutfit()">Roll fit ↻</button>
    </div>
  </div>

  <div id="outfit-area">
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <div>Hit Roll fit to generate a coordinated outfit</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="roll-count">0</div><div class="stat-lbl">Rolls</div></div>
    <div class="stat"><div class="stat-val" id="strong-count">0</div><div class="stat-lbl">Strong fits</div></div>
    <div class="stat"><div class="stat-val" id="exp-count">0</div><div class="stat-lbl">Experimental</div></div>
    <div class="stat"><div class="stat-val" id="risky-count">0</div><div class="stat-lbl">Risky fits</div></div>
  </div>
</main>

<footer>Built around your wardrobe · Color-theory coordinated</footer>

    {id:'sh4',name:'Black Yeezy slides',hex:'#1C1C1C',score:2},
    {id:'sh5',name:'Yellow Yeezy slides',hex:'#F9C922',score:2},
  ]
};

const SCHEMES = {
  monochrome:{ name:'Monochromatic', desc:'Same tone family throughout — clean, unified, intentional.' },
  contrast:  { name:'High contrast', desc:'Light vs dark — one of the strongest moves in casual menswear.' },
  bold:      { name:'Bold statement', desc:'Saturated color as the focal point, everything else pulled back.' },
  analogous: { name:'Analogous', desc:'Neighboring hues that naturally sit together without matching exactly.' },
  earth:     { name:'Earth tones', desc:'Browns, olives, and naturals — quietly elevated and underused.' },
  neutral:   { name:'Neutral anchor', desc:'One statement piece; the rest of the fit stays clean and grounded.' },
};

/* ─── STATE ─── */
let rollCount=0,strongCount=0,expCount=0,riskyCount=0;
let currentFilter='all';
let lastTopId='',lastBottomId='';
let currentOutfit=null;

let scoreOverrides={};
let itemImages={};
try {
  scoreOverrides=JSON.parse(localStorage.getItem('fitpicker_scores')||'{}');
  itemImages=JSON.parse(localStorage.getItem('fitpicker_images')||'{}');
} catch(e){}

/* ─── SCORE HELPERS ─── */
function getScore(item){
  return scoreOverrides[item.id]!==undefined ? scoreOverrides[item.id] : item.score;
}

function findItemById(id){
  for(const cat of Object.values(WARDROBE)){
    const f=cat.find(i=>i.id===id);
    if(f) return f;
  }
  return null;
}

function adjustScore(id,delta){
  const item=findItemById(id);
  if(!item) return;
  const cur=getScore(item);
  scoreOverrides[id]=Math.max(-5,Math.min(5,cur+delta));
  try{ localStorage.setItem('fitpicker_scores',JSON.stringify(scoreOverrides)); }catch(e){}
  renderWardrobePanel();
}

function resetAllScores(){
  if(!confirm('Reset all scores to their defaults?')) return;
  scoreOverrides={};
  try{ localStorage.setItem('fitpicker_scores','{}'); }catch(e){}
  renderWardrobePanel();
}

/* ─── IMAGE HELPERS ─── */
function resizeImage(dataURL,maxPx,cb){
  const img=new Image();
  img.onload=function(){
    const canvas=document.createElement('canvas');
    const r=Math.min(maxPx/img.width,maxPx/img.height,1);
    canvas.width=Math.round(img.width*r);
    canvas.height=Math.round(img.height*r);
    canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
    cb(canvas.toDataURL('image/jpeg',0.82));
  };
  img.src=dataURL;
}

function triggerImageUpload(id){
  const inp=document.getElementById('upload-'+id);
  if(inp) inp.click();
}

function handleImageUpload(id,input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    resizeImage(e.target.result,500,function(small){
      itemImages[id]=small;
      try{ localStorage.setItem('fitpicker_images',JSON.stringify(itemImages)); }catch(err){
        alert('Storage full — try removing some photos first.');
        return;
      }
      renderWardrobePanel();
      // Refresh outfit card if this item is currently shown
      if(currentOutfit) renderOutfit(currentOutfit);
    });
  };
  reader.readAsDataURL(file);
  input.value=''; // reset so same file can be re-selected
}

function removeImage(id,event){
  event.stopPropagation();
  delete itemImages[id];
  try{ localStorage.setItem('fitpicker_images',JSON.stringify(itemImages)); }catch(e){}
  renderWardrobePanel();
  if(currentOutfit) renderOutfit(currentOutfit);
}

/* ─── WARDROBE PANEL ─── */
function openWardrobe(){
  document.getElementById('wardrobe-modal').classList.add('open');
  renderWardrobePanel();
}
function closeWardrobe(){
  document.getElementById('wardrobe-modal').classList.remove('open');
}
function handleOverlayClick(e){
  if(e.target===document.getElementById('wardrobe-modal')) closeWardrobe();
}

function renderWardrobePanel(){
  const sections=[
    {title:'Tops / Jerseys / Hoodies',items:WARDROBE.tops},
    {title:'Under shirts',items:WARDROBE.shirts},
    {title:'Bottoms',items:WARDROBE.bottoms},
    {title:'Shoes',items:WARDROBE.shoes},
  ];

  let html='';
  for(const sec of sections){
    html+=`<div class="wardrobe-section-title">${sec.title}</div>`;
    for(const item of sec.items){
      const score=getScore(item);
      const base=item.score;
      const modified=score!==base;
      const valCls=score>0?'pos':score<0?'neg':'';
      const modCls=modified?'modified':'';
      const scoreStr=score>0?'+'+score:''+score;
      const img=itemImages[item.id];

      html+=`
        <div class="wardrobe-item">
          <div class="wi-thumb" onclick="triggerImageUpload('${item.id}')" title="Click to add photo">
            ${img
              ? `<img src="${img}" alt="${item.name}">`
              : `<span class="wi-thumb-icon">📷</span>`
            }
          </div>
          <input type="file" accept="image/*" class="hidden-upload" id="upload-${item.id}"
            onchange="handleImageUpload('${item.id}',this)">
          <div class="wi-info">
            <div class="wi-name" title="${item.name}">${item.name}</div>
            <div class="wi-base">base: ${base>0?'+'+base:''+base}${modified?' · modified':''}</div>
          </div>
          <div class="wi-controls">
            <button class="wi-btn" onclick="adjustScore('${item.id}',-1)">−</button>
            <span class="wi-val ${valCls} ${modCls}">${scoreStr}</span>
            <button class="wi-btn" onclick="adjustScore('${item.id}',1)">+</button>
          </div>
        </div>`;
    }
  }
  document.getElementById('wardrobe-list').innerHTML=html;
}

/* ─── FILTER ─── */
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* ─── WEIGHT CURVES ─── */
function scoreWeight(score,filter){
  if(filter==='high'){
    if(score<1) return 0;
    return Math.pow(score+1,2.2);
  }
  if(filter==='all'){
    if(score>=3)  return 20;
    if(score===2) return 13;
    if(score===1) return 7;
    if(score===0) return 3;
    if(score===-1)return 1.5;
    if(score===-2)return 0.6;
    return 0.2;
  }
  if(score>=3)  return 18;
  if(score===2) return 11;
  if(score===1) return 6;
  if(score===0) return 2.5;
  if(score===-1)return 1.2;
  if(score===-2)return 0.4;
  return 0.15;
}

function weightedPick(arr,filter){
  const total=arr.reduce((s,x)=>s+scoreWeight(getScore(x),filter),0);
  if(total===0) return arr[Math.floor(Math.random()*arr.length)];
  let r=Math.random()*total;
  for(const x of arr){r-=scoreWeight(getScore(x),filter);if(r<=0)return x;}
  return arr[arr.length-1];
}

/* ─── COLOR UTILS ─── */
function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);let h=0,s,l=(max+min)/2;
  if(max!==min){const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
  switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}
  }else s=0;
  return{h:h*360,s:s*100,l:l*100};
}

function colorName(hex){
  const map={
    '#1C1C1C':'Black','#F0EDE8':'White','#9E9E9E':'Gray','#BDBDBD':'Light gray',
    '#ADADAD':'Gray','#555555':'Dark gray','#6B4226':'Brown','#1B2A4A':'Navy',
    '#C0392B':'Red','#D4560A':'Orange','#A50044':'Burgundy','#005695':'Blue',
    '#4A90D9':'Blue','#90CAF9':'Light blue','#5C85B0':'Medium blue','#556B2F':'Camo olive',
    '#F9C922':'Yellow','#2D6A4F':'Pine green','#757575':'Gray/black','#8A8A8A':'Gray',
    '#1B4D2E':'Forest green'
  };
  return map[hex]||'Mixed';
}

function getScheme(topHex,botHex,shoeHex){
  const t=hexToHsl(topHex),b=hexToHsl(botHex);
  const neutral=h=>h.s<15;
  const saturated=h=>h.s>45;
  if(neutral(t)&&neutral(b)) return 'monochrome';
  if(Math.abs(t.l-b.l)>42) return 'contrast';
  if(saturated(t)&&t.s>55) return 'bold';
  if(Math.abs(t.h-b.h)<35&&t.s>12&&b.s>12) return 'analogous';
  if((topHex==='#6B4226'||topHex==='#556B2F')&&neutral(b)) return 'earth';
  return 'neutral';
}

function compatible(topHex,botHex,shoeHex){
  if(topHex===botHex&&!['#1C1C1C','#F0EDE8','#9E9E9E','#ADADAD'].includes(topHex)) return false;
  if(topHex==='#C0392B'&&(botHex==='#1B2A4A'||botHex==='#005695')) return false;
  if(topHex==='#A50044'&&(botHex==='#C0392B'||botHex==='#1B4D2E')) return false;
  if(topHex==='#1B4D2E'&&botHex==='#90CAF9') return false;
  if(topHex==='#D4560A'&&botHex==='#F0EDE8') return false;
  if(topHex==='#4A90D9'&&botHex==='#1B2A4A') return false;
  if(shoeHex==='#F9C922'&&(botHex==='#90CAF9'||botHex==='#F0EDE8'||botHex==='#5C85B0')) return false;
  if(shoeHex==='#F9C922'&&(topHex==='#C0392B'||topHex==='#A50044')) return false;
  if(shoeHex==='#2D6A4F'&&(topHex==='#C0392B'||topHex==='#A50044'||topHex==='#D4560A')) return false;
  if(shoeHex==='#2D6A4F'&&(botHex==='#90CAF9'||botHex==='#1B2A4A')) return false;
  return true;
}

function getRating(score,scheme){
  if(score<=-3) return{label:'Risky fit',cls:'rating-risky',key:'risky'};
  if(score<=-1||scheme==='bold') return{label:'Experimental',cls:'rating-exp',key:'exp'};
  if(score>=5) return{label:'Strong fit',cls:'rating-strong',key:'strong'};
  return{label:'Solid fit',cls:'rating-solid',key:'solid'};
}

function buildWhy(top,shirt,bottom,shoe,scheme){
  const tips=[];
  if(top.cat==='jersey') tips.push('Jersey over a '+(shirt&&shirt.hex==='#1C1C1C'?'black':'white')+' tee — classic streetwear layering. Keep a bit of the tee visible at the hem.');
  if(top.hex==='#D4560A') tips.push('The dirt bike jersey is loud in the best way. Dark neutral bottoms keep the fit from looking chaotic.');
  if(top.hex==='#6B4226') tips.push('Brown is the most underrated neutral in streetwear. Few people wear it. Fewer wear it well.');
  if(top.hex==='#C0392B') tips.push('Vintage red reads bold but grounded. The worn-in look takes the edge off the saturation.');
  if(top.hex==='#556B2F') tips.push('Camo is a statement on its own. Dark shoes and a neutral bottom let it breathe without fighting for attention.');
  if(top.hex==='#1B4D2E') tips.push('Forest green is legitimately trending streetwear territory right now. Earth or neutral tones around it keep the fit cohesive.');
  if(top.oversized) tips.push('Oversized top with pants is the silhouette call here — proportions work. Same top with shorts would look unbalanced.');
  if(bottom.hex==='#1C1C1C') tips.push('Black bottoms are the streetwear cheat code — they absorb almost any top color without competing.');
  if(bottom.hex==='#BDBDBD') tips.push('Light grey shorts are slept on. They can swing minimal or sporty depending entirely on what is above them.');
  if(shoe.hex==='#F9C922') tips.push('Yellow slides are the accent of the entire fit. One bold pop — nothing else should compete.');
  if(shoe.hex==='#2D6A4F') tips.push('Pine green Jordans need negative space around them. Keep the palette cool and neutral so the shoe lands.');
  if(top.score<=-1&&bottom.score<=-1) tips.push('Both pieces are lower preference — that is fine, it is still color-coordinated. Consider swapping one for a higher-rated piece if it feels off.');
  if(scheme==='monochrome') tips.push('Monochromatic fits live or die by proportion. Make sure the silhouette feels deliberate and not accidental.');
  if(scheme==='contrast'&&!tips.length) tips.push('Light and dark contrast is one of the cleanest combinations in casual menswear. Reads well from a distance.');
  if(scheme==='earth'&&!tips.length) tips.push('Earth tones together signal quiet confidence — this is a palette most people never pull off intentionally.');
  if(scheme==='bold'&&!tips.length) tips.push('Bold saturated color as the focal point. Keep everything else restrained — do not compete with the statement piece.');
  if(!tips.length) tips.push(SCHEMES[scheme]?.desc||'Colors are balanced and complementary for a spring streetwear fit.');
  return tips[0];
}

function scoreLabel(s){
  if(s>0) return{text:'+'+s,cls:'pos'};
  if(s<0) return{text:''+s,cls:'neg'};
  return{text:'±0',cls:''};
}

/* ─── PICK SHIRT ─── */
function pickShirt(top,filter){
  if(top.cat==='jersey'||top.cat==='hoodie'){
    const darkTop=['#1C1C1C','#1B2A4A','#A50044','#005695','#1B4D2E'].includes(top.hex);
    const pool=darkTop?WARDROBE.shirts.filter(s=>s.hex==='#1C1C1C'||s.hex==='#F0EDE8'):WARDROBE.shirts;
    return weightedPick(pool,filter);
  }
  return null;
}

/* ─── ROLL FULL OUTFIT ─── */
function rollOutfit(){
  const f=currentFilter;
  let attempts=0,outfit=null;

  while(attempts<400){
    attempts++;
    let bottomPool;
    if(f==='shorts') bottomPool=WARDROBE.bottoms.filter(b=>b.isShorts);
    else if(f==='pants') bottomPool=WARDROBE.bottoms.filter(b=>!b.isShorts);
    else if(f==='high') bottomPool=WARDROBE.bottoms.filter(b=>b.isShorts&&getScore(b)>=0);
    else{
      bottomPool=Math.random()<0.72
        ?WARDROBE.bottoms.filter(b=>b.isShorts)
        :WARDROBE.bottoms.filter(b=>!b.isShorts);
    }
    if(!bottomPool.length) continue;
    const bottom=weightedPick(bottomPool,f);
    const usingPants=!bottom.isShorts;

    let topPool=WARDROBE.tops.filter(t=>{
      if(f==='high'&&getScore(t)<1) return false;
      if(t.oversized&&!usingPants) return false;
      if(!usingPants&&!t.warm&&!t.oversized) return false;
      return true;
    });
    if(!topPool.length) continue;
    const top=weightedPick(topPool,f);
    const shirt=pickShirt(top,f);

    let shoePool=f==='high'?WARDROBE.shoes.filter(s=>getScore(s)>=1):WARDROBE.shoes;
    if(!shoePool.length) shoePool=WARDROBE.shoes;
    let shoe=null;
    for(let si=0;si<40;si++){
      const c=weightedPick(shoePool,f);
      if(compatible(top.hex,bottom.hex,c.hex)){shoe=c;break;}
    }
    if(!shoe) continue;
    if(!compatible(top.hex,bottom.hex,shoe.hex)) continue;
    if(top.id===lastTopId&&bottom.id===lastBottomId) continue;

    const scheme=getScheme(top.hex,bottom.hex,shoe.hex);
    const totalScore=getScore(top)+getScore(bottom)+getScore(shoe);
    const rating=getRating(totalScore,scheme);
    outfit={top,shirt,bottom,shoe,scheme,totalScore,rating};
    lastTopId=top.id; lastBottomId=bottom.id;
    break;
  }

  if(!outfit){
    document.getElementById('outfit-area').innerHTML='<div class="empty-state"><div class="empty-icon">✕</div><div>No valid fit found for this filter — try another</div></div>';
    return;
  }

  rollCount++;
  if(outfit.rating.key==='strong') strongCount++;
  if(outfit.rating.key==='exp') expCount++;
  if(outfit.rating.key==='risky') riskyCount++;
  document.getElementById('roll-count').textContent=rollCount;
  document.getElementById('strong-count').textContent=strongCount;
  document.getElementById('exp-count').textContent=expCount;
  document.getElementById('risky-count').textContent=riskyCount;

  currentOutfit=outfit;
  renderOutfit(outfit);
}

/* ─── RE-ROLL A SINGLE SLOT ─── */
function rerollSlot(slot){
  if(!currentOutfit) return;
  let{top,shirt,bottom,shoe}=currentOutfit;
  let newTop=top,newShirt=shirt,newBottom=bottom,newShoe=shoe;
  const f=currentFilter;

  if(slot==='top'){
    const usingPants=!bottom.isShorts;
    const pool=WARDROBE.tops.filter(t=>{
      if(t.id===top.id) return false;
      if(f==='high'&&getScore(t)<1) return false;
      if(t.oversized&&!usingPants) return false;
      if(!usingPants&&!t.warm&&!t.oversized) return false;
      return true;
    });
    let found=false;
    for(let i=0;i<60;i++){
      if(!pool.length) break;
      const c=weightedPick(pool,f);
      if(compatible(c.hex,bottom.hex,shoe.hex)){
        newTop=c;
        newShirt=pickShirt(c,f);
        found=true; break;
      }
    }
    if(!found) return;
  } else if(slot==='shirt'){
    if(!shirt) return;
    const pool=WARDROBE.shirts.filter(s=>s.id!==shirt.id);
    if(!pool.length) return;
    newShirt=weightedPick(pool,f);
  } else if(slot==='bottom'){
    let pool;
    if(f==='shorts') pool=WARDROBE.bottoms.filter(b=>b.isShorts&&b.id!==bottom.id);
    else if(f==='pants') pool=WARDROBE.bottoms.filter(b=>!b.isShorts&&b.id!==bottom.id);
    else if(f==='high') pool=WARDROBE.bottoms.filter(b=>b.isShorts&&getScore(b)>=0&&b.id!==bottom.id);
    else pool=WARDROBE.bottoms.filter(b=>b.id!==bottom.id);
    let found=false;
    for(let i=0;i<60;i++){
      if(!pool.length) break;
      const c=weightedPick(pool,f);
      const newUsingPants=!c.isShorts;
      if(top.oversized&&!newUsingPants) continue;
      if(!newUsingPants&&!top.warm&&!top.oversized) continue;
      if(compatible(top.hex,c.hex,shoe.hex)){ newBottom=c; found=true; break; }
    }
    if(!found) return;
  } else if(slot==='shoe'){
    let pool=(f==='high'?WARDROBE.shoes.filter(s=>getScore(s)>=1):WARDROBE.shoes).filter(s=>s.id!==shoe.id);
    if(!pool.length) pool=WARDROBE.shoes.filter(s=>s.id!==shoe.id);
    let found=false;
    for(let i=0;i<60;i++){
      if(!pool.length) break;
      const c=weightedPick(pool,f);
      if(compatible(top.hex,bottom.hex,c.hex)){ newShoe=c; found=true; break; }
    }
    if(!found) return;
  }

  const scheme=getScheme(newTop.hex,newBottom.hex,newShoe.hex);
  const totalScore=getScore(newTop)+getScore(newBottom)+getScore(newShoe);
  const rating=getRating(totalScore,scheme);
  currentOutfit={top:newTop,shirt:newShirt,bottom:newBottom,shoe:newShoe,scheme,totalScore,rating};
  renderOutfit(currentOutfit);
}

/* ─── RENDER ─── */
function renderOutfit({top,shirt,bottom,shoe,scheme,totalScore,rating}){
  const si=SCHEMES[scheme]||SCHEMES.neutral;
  const why=buildWhy(top,shirt,bottom,shoe,scheme);

  // Palette swatches
  const rawSwatches=[
    {hex:top.hex,label:colorName(top.hex)},
    ...(shirt?[{hex:shirt.hex,label:colorName(shirt.hex)+' (under)'}]:[]),
    {hex:bottom.hex,label:colorName(bottom.hex)},
    {hex:shoe.hex,label:colorName(shoe.hex)},
  ];
  const swatches=rawSwatches.filter((s,i,a)=>i===0||s.hex!==a[i-1].hex);
  const swatchHTML=swatches.map((s,i)=>`
    ${i>0?'<div class="swatch-sep"></div>':''}
    <div class="swatch" style="background:${s.hex}" title="${s.label}"></div>
    <span class="swatch-name">${s.label}</span>`).join('');

  // Pieces
  const pieces=[
    {slot:'top',  cat:top.cat==='jersey'?'Jersey':top.cat==='collar'?'Outer shirt':'Sweatshirt / hoodie', item:top.name,   hex:top.hex,    rawItem:top},
    ...(shirt?[{slot:'shirt',cat:'Under shirt', item:shirt.name, hex:shirt.hex, rawItem:shirt}]:[]),
    {slot:'bottom',cat:bottom.isShorts?'Shorts':'Pants', item:bottom.name, hex:bottom.hex, rawItem:bottom},
    {slot:'shoe',  cat:'Shoes',   item:shoe.name,   hex:shoe.hex,   rawItem:shoe},
  ];

  const piecesHTML=pieces.map(p=>{
    const sc=getScore(p.rawItem);
    const sl=scoreLabel(sc);
    const img=itemImages[p.rawItem.id];
    return `<div class="piece-card">
      ${img?`<div class="piece-img-wrap"><img class="piece-img" src="${img}" alt="${p.item}"></div>`:''}
      <div class="piece-card-body">
        <div class="piece-card-top-row">
          <div>
            <div class="piece-cat">${p.cat}</div>
            <div class="piece-name">${p.item}</div>
          </div>
          <button class="reroll-slot-btn" onclick="rerollSlot('${p.slot}')" title="Re-roll this piece">↻</button>
        </div>
        <div class="piece-color-row">
          <div class="piece-dot" style="background:${p.hex}"></div>
          <span class="piece-color-name">${colorName(p.hex)}</span>
          <span class="piece-score ${sl.cls}">${sl.text}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  const sc=Math.round(totalScore);
  const scLabel=sc>0?'+'+sc:''+sc;
  const typeTag=bottom.isShorts?'Shorts fit':'Pants fit';
  const oversizedTag=top.oversized?' · Oversized top':'';

  document.getElementById('outfit-area').innerHTML=`
    <div class="outfit-card">
      <div class="outfit-header">
        <div>
          <div class="outfit-scheme">${si.name}</div>
          <div class="outfit-sub">Score ${scLabel} · ${typeTag}${oversizedTag}</div>
        </div>
        <div class="rating-pill ${rating.cls}">${rating.label}</div>
      </div>
      <div class="palette-bar">
        <span class="palette-label">Palette</span>
        ${swatchHTML}
      </div>
      <div class="pieces-grid">${piecesHTML}</div>
      <div class="why-block">${why}</div>
    </div>`;
}
</script>
